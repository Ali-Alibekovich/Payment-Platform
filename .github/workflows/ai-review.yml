name: AI Inline Senior Review

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Ты — senior Java/Spring backend-инженер, делаешь инлайн-ревью PR в платёжной платформе.

            Приоритеты (в порядке важности):
            1. Корректность: баги, конкурентность, границы @Transactional, NPE, null-safety.
            2. Безопасность: authN/authZ, SQL/JPQL injection, утечка секретов, небезопасная десериализация, CSRF/CORS.
            3. Финансовая корректность: округление денег, идемпотентность, ретраи, double-spend, race conditions.
            4. Spring-подводные камни: @Transactional self-invocation, lazy init, scope бинов, отсутствие @Valid.
            5. Надёжность: утечки ресурсов, проглатывание исключений, отсутствие обработки ошибок на границах.
            6. Производительность на hot-path: N+1, unbounded fetch, лишние аллокации.

            Модули платформы: auth-module, account-module, limits-module, transaction-module,
            analytics-module, notification-module, fraud-module, audit-module, infrastructure.

            Жёсткие правила:
            - Комментируй ТОЛЬКО изменённые строки в этом PR.
            - Никаких nit-ов, стиля, форматирования, похвалы.
            - В каждом комменте — конкретное направление фикса.
            - Пиши на русском, до 300 символов на коммент.
            - Не более 20 инлайн-комментов суммарно; приоритизируй high > medium > low.
            - Каждый инлайн-коммент начинай с префикса серьёзности: **[HIGH]**, **[MEDIUM]** или **[LOW]**.

            Формат вывода:
            - Используй `mcp__github_inline_comment__create_inline_comment` с `confirmed: true` для инлайн-замечаний.
            - В конце — один top-level коммент через `gh pr comment` с кратким саммари на русском
              (1–3 предложения: что поменялось и главные риски).
            - Не дублируй саммари сообщениями в чат — только через GitHub API.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
