spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_module
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  # В проде задайте JWT_SECRET (например: openssl rand -base64 48)
  secret: ${JWT_SECRET:change-me-use-env-in-production-min-32-chars!!}
  issuer: ${JWT_ISSUER:payment-platform-auth}
  clock-skew-seconds: ${JWT_CLOCK_SKEW_SECONDS:60}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}        # 15 минут
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}   # 30 дней

auth:
  login:
    max-failed-attempts: ${AUTH_LOGIN_MAX_FAILED:5}
    lock-duration-minutes: ${AUTH_LOGIN_LOCK_MINUTES:15}

server:
  port: 9091
