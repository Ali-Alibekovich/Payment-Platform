spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: fintech
    password: fintech
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password: fintech
  flyway:
    enabled: true

jwt:
  # В проде задайте JWT_SECRET (например: openssl rand -base64 48)
  secret: ${JWT_SECRET:change-me-use-env-in-production-min-32-chars!!}
  issuer: ${JWT_ISSUER:payment-platform-auth}
  clock-skew-seconds: ${JWT_CLOCK_SKEW_SECONDS:60}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}        # 15 минут
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}   # 30 дней

auth:
  login:
    max-failed-attempts: ${AUTH_LOGIN_MAX_FAILED:5}
    lock-duration-minutes: ${AUTH_LOGIN_LOCK_MINUTES:15}
  cookies:
    refresh-token-name: refresh_token
    path: /api/v1/auth
    secure: ${AUTH_COOKIE_SECURE:false} # В проде задать true
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    http-only: true
  admin:
    email: ${AUTH_ADMIN_EMAIL:admin@payment-platform.local}
    password: ${AUTH_ADMIN_PASSWORD:F1xMeee!}
    full-name: ${AUTH_ADMIN_FULL_NAME:Administrator}
    role-name: ${AUTH_ADMIN_ROLE:ADMIN}

server:
  port: 9091
logging:
  level:
    org.example.*: DEBUG
